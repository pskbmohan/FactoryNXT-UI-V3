# FactoryNXT – Local development stack
# Services: backend (FastAPI), postgres, redis, minio
# Usage: docker compose up -d

version: "3.9"

services:

  # ──────────────────────────────────────────────
  # FastAPI backend
  # ──────────────────────────────────────────────
  backend:
    build:
      context: ../backend        # adjust to your backend repo path
      dockerfile: Dockerfile
    container_name: factorynxt_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      # MinIO / S3-compatible storage
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
      MINIO_SECURE: "false"
      # App
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - factorynxt

  # ──────────────────────────────────────────────
  # PostgreSQL
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: factorynxt_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - factorynxt

  # ──────────────────────────────────────────────
  # Redis – session cache / task queue broker
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: factorynxt_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - factorynxt

  # ──────────────────────────────────────────────
  # MinIO – S3-compatible object storage
  # Used for: recipe attachments, work-order docs,
  #           firmware blobs, report exports
  # ──────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: factorynxt_minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - factorynxt

  # ──────────────────────────────────────────────
  # MinIO bucket initialiser (runs once then exits)
  # Creates the default bucket on first boot
  # ──────────────────────────────────────────────
  minio_init:
    image: minio/mc:latest
    container_name: factorynxt_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
        mc mb --ignore-existing local/${MINIO_BUCKET_NAME};
        mc anonymous set download local/${MINIO_BUCKET_NAME}/public;
        echo 'MinIO bucket ready.';
      "
    networks:
      - factorynxt

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  factorynxt:
    driver: bridge
